server:
  port: 80

spring:
  mvc:
    view:
      prefix: /views/
      suffix: .jsp

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 40MB

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/port_db
    username: port_user
    password: 123456

mybatis:
  configuration:
    map-underscore-to-camel-case: true
